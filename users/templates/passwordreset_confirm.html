{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h4>Set New Password</h4>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>New Password</label>
{{ form.new_password1 }}
</div>

<div class="mb-3">
<label>Confirm Password</label>
{{ form.new_password2 }}
</div>

<button class="btn btn-primary">Reset Password</button>

</form>

</div>

</div>

{% endblock %}
