<!DOCTYPE html>
<html>
<head>
    <title>Event Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="/">Event System</a>

<div>
<a class="btn btn-outline-light me-2" href="{% url 'profile' %}">Profile</a>
<a class="btn btn-outline-light me-2" href="{% url 'edit_profile' %}">Edit</a>
<a class="btn btn-outline-light me-2" href="{% url 'change_password' %}">Password</a>
<a class="btn btn-danger" href="{% url 'logout' %}">Logout</a>
</div>

</div>
</nav>

<div class="container mt-5">

{% if messages %}
{% for message in messages %}
<div class="alert alert-success">
{{ message }}
</div>
{% endfor %}
{% endif %}

{% block content %}

{% endblock %}

</div>

</body>
</html>
