{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

<div class="card-header bg-danger text-white">
<h4>Reset Password</h4>
</div>

<div class="card-body">

<p>Enter your email to receive password reset link.</p>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Email</label>
{{ form.email }}
</div>

<button class="btn btn-danger">Send Reset Link</button>

</form>

</div>

</div>

{% endblock %}
