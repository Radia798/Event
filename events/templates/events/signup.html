{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Sign Up</h1>
  <form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" class="w-full mb-2 p-2 border rounded">
    <input type="email" name="email" placeholder="Email" class="w-full mb-2 p-2 border rounded">
    <input type="text" name="first_name" placeholder="First Name" class="w-full mb-2 p-2 border rounded">
    <input type="text" name="last_name" placeholder="Last Name" class="w-full mb-2 p-2 border rounded">
    <input type="password" name="password" placeholder="Password" class="w-full mb-4 p-2 border rounded">
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Sign Up</button>
  </form>
  <p class="mt-4 text-center text-sm">Already have an account? <a href="{% url 'login' %}" class="text-blue-600">Login</a></p>
</div>
{% endblock %}
