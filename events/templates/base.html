<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="font-bold text-xl">EventMS</a>
            <div class="space-x-4">
                <a href="{% url 'event-list' %}" class="hover:underline">Events</a>
                <a href="{% url 'user-list' %}" class="hover:underline">Users</a>
                <a href="{% url 'category-list' %}" class="hover:underline">Categories</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
